server_name: brai-nats
port: 4222
http_port: 8222

max_payload: 64KB
max_pending: 64MB
write_deadline: "10s"

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 64MB
  max_file_store: 1GB
}

authorization {
  users: [
    {
      user: $NATS_GATEWAY_USER
      password: $NATS_GATEWAY_PASSWORD
      permissions: {
        publish: [
          "brai.factory.activity.create.v1",
          "brai.factory.activity.list.v1",
          "brai.access.agent-run.create.v1",
          "brai.access.developer-mode.set.v1"
        ]
        subscribe: [
          "_INBOX.brai.gateway.>"
        ]
      }
    },
    {
      user: $NATS_FACTORY_USER
      password: $NATS_FACTORY_PASSWORD
      permissions: {
        publish: [
          "_INBOX.brai.gateway.>"
        ]
        subscribe: [
          "brai.factory.activity.create.v1",
          "brai.factory.activity.list.v1"
        ]
      }
    },
    {
      user: $NATS_ACCESS_USER
      password: $NATS_ACCESS_PASSWORD
      permissions: {
        publish: [
          "_INBOX.brai.gateway.>",
          "_INBOX.brai.runtime.>",
          "brai.runtime.agent-run.launch.v1",
          "brai.runtime.agent-run.terminate.v1",
          "brai.runtime.user-environment.provision.v1"
        ]
        subscribe: [
          "brai.access.agent-run.create.v1",
          "brai.access.developer-mode.set.v1",
          "brai.access.runtime-receipt.claim.v1",
          "brai.access.runtime-receipt.started.v1",
          "brai.access.runtime-receipt.exit.v1",
          "_INBOX.brai.access.>"
        ]
      }
    },
    {
      user: $NATS_RUNTIME_USER
      password: $NATS_RUNTIME_PASSWORD
      permissions: {
        publish: [
          "_INBOX.brai.access.>",
          "brai.access.runtime-receipt.claim.v1",
          "brai.access.runtime-receipt.started.v1",
          "brai.access.runtime-receipt.exit.v1"
        ]
        subscribe: [
          "brai.runtime.agent-run.launch.v1",
          "brai.runtime.agent-run.terminate.v1",
          "brai.runtime.user-environment.provision.v1",
          "_INBOX.brai.runtime.>"
        ]
      }
    }
  ]
}
