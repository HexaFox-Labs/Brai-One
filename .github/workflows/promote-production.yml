name: promote-production

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Optional exact persisted revision for a protected rollback.
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  promote-exact-release-preview:
    name: promote-exact-release-preview
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    steps:
      - name: Fetch the immutable manifest from this release preview or Dev
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          REVISION: ${{ inputs.revision || github.sha }}
          ROLLBACK_REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          if [[ ! "$REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Production revision must be a full lowercase Git SHA" >&2
            exit 1
          fi
          if [[ -n "$ROLLBACK_REVISION" ]]; then
            sources=(dev)
          else
            sources=(preview dev)
          fi
          for source in "${sources[@]}"; do
            image="ghcr.io/${GITHUB_REPOSITORY,,}:brai-delivery-manifest-${source}-${REVISION}"
            if docker pull "$image"; then break; fi
            image=""
          done
          if [[ -z "${image:-}" ]]; then
            echo "No exact release preview or Dev manifest exists for ${REVISION}" >&2
            exit 1
          fi
          container=$(docker create "$image")
          trap 'docker rm -f "$container" >/dev/null' EXIT
          docker cp "$container:/manifest.json" delivery-manifest.json

      - name: Convert and validate the fixed production receiver manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          REVISION: ${{ inputs.revision || github.sha }}
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          const source = JSON.parse(await readFile("delivery-manifest.json", "utf8"));
          const names = ["web", "api-gateway", "factory", "access", "factory-admin", "access-admin", "nats"];
          const root = `ghcr.io/${process.env.GITHUB_REPOSITORY.toLowerCase()}`;
          if (source.revision !== process.env.REVISION || !source.images) {
            throw new Error("Delivery manifest is not for this exact release revision");
          }
          const images = {};
          for (const name of names) {
            const reference = source.images[name];
            const match = typeof reference === "string" && reference.match(new RegExp(`^${root.replace(/[.*+?^${}()|[\\]\\]/g, "\\$&")}@(sha256:[0-9a-f]{64})$`));
            if (!match) throw new Error(`Delivery manifest has invalid ${name} image`);
            images[name] = { digest: match[1], reference };
          }
          if (Object.keys(source.images).length !== names.length) {
            throw new Error("Delivery manifest image set is incomplete");
          }
          await writeFile("production-manifest.json", `${JSON.stringify({
            schema_version: "brai.deployment.images.v1",
            host_contract_version: "brai.production-host.v3",
            source_repository: process.env.GITHUB_REPOSITORY,
            source_revision: process.env.REVISION,
            images,
          }, null, 2)}\n`, { mode: 0o600 });
          NODE

      - name: Submit only the validated manifest to the fixed production receiver
        env:
          BRAI_PRODUCTION_DEPLOY_PRIVATE_KEY: ${{ secrets.BRAI_PRODUCTION_DEPLOY_PRIVATE_KEY }}
          BRAI_PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.BRAI_PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$BRAI_PRODUCTION_DEPLOY_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$BRAI_PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            brai-new-deploy@157.254.223.221 < production-manifest.json
