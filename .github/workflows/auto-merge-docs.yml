name: auto-merge-docs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  enable-after-reduced-check:
    name: enable-docs-auto-merge
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'dev' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Mark documentation-only pull requests ready for the primary agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node --input-type=module <<'NODE'
          const api = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}`;
          const headers = {
            accept: "application/vnd.github+json",
            authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
            "x-github-api-version": "2022-11-28",
          };
          const files = [];
          for (let page = 1; ; page += 1) {
            const response = await fetch(
              `${api}/pulls/${process.env.PR_NUMBER}/files?per_page=100&page=${page}`,
              { headers },
            );
            if (!response.ok) throw new Error(`Cannot list PR files: ${response.status}`);
            const pageFiles = await response.json();
            files.push(...pageFiles.map((file) => file.filename));
            if (pageFiles.length < 100) break;
          }
          const isDocumentation = (path) =>
            path === "README.md" ||
            path.startsWith("docs/") ||
            path.startsWith("memory-bank/") ||
            path.endsWith(".md");
          if (files.length === 0 || !files.every(isDocumentation)) {
            console.log("Not a documentation-only pull request; auto-merge remains disabled.");
            process.exit(0);
          }
          console.log("Documentation-only pull request is ready for exact-head agent merge.");
          NODE
