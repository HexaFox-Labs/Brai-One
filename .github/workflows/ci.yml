name: affected-ci

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "release/**"
      - "hotfix/**"

concurrency:
  group: affected-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact trusted revision and merge base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22.22.3
          check-latest: false

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.1 --activate
          node --version
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run only the declared affected checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node tools/ci/run-affected.mjs --base="$BASE_SHA" --head="$HEAD_SHA"
