name: enable-runtime-automerge

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Number of the runtime pull request accepted by Sergey.
        required: true
        type: number

permissions:
  contents: read
  id-token: write
  pull-requests: write
  statuses: write

jobs:
  accept-exact-preview:
    name: accept-exact-preview
    if: >-
      github.actor == github.repository_owner &&
      vars.BRAI_DELIVERY_ENDPOINT != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enable native auto-merge only for the exact deployed preview revision
        env:
          BRAI_DELIVERY_ENDPOINT: ${{ vars.BRAI_DELIVERY_ENDPOINT }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pull_request }}
        run: |
          node --input-type=module <<'NODE'
          const api = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}`;
          const headers = {
            accept: "application/vnd.github+json",
            authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
            "content-type": "application/json",
            "x-github-api-version": "2022-11-28",
          };
          const pullRequestResponse = await fetch(
            `${api}/pulls/${process.env.PR_NUMBER}`,
            { headers },
          );
          if (!pullRequestResponse.ok) {
            throw new Error(`Cannot read pull request: ${pullRequestResponse.status}`);
          }
          const pullRequest = await pullRequestResponse.json();
          if (
            pullRequest.state !== "open" ||
            pullRequest.draft ||
            pullRequest.base?.ref !== "dev" ||
            pullRequest.head?.repo?.full_name !== process.env.GITHUB_REPOSITORY ||
            !/^[0-9a-f]{40}$/u.test(pullRequest.head?.sha ?? "")
          ) {
            throw new Error("Pull request is not an acceptable primary-repository runtime revision");
          }
          const oidcResponse = await fetch(
            `${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=brai-delivery`,
            { headers: { authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` } },
          );
          if (!oidcResponse.ok) throw new Error(`Cannot get GitHub OIDC token: ${oidcResponse.status}`);
          const { value: oidc } = await oidcResponse.json();
          const statusResponse = await fetch(
            `${process.env.BRAI_DELIVERY_ENDPOINT}/v1/status?branch=${encodeURIComponent(pullRequest.head.ref)}`,
            { headers: { authorization: `Bearer ${oidc}` } },
          );
          if (!statusResponse.ok) throw new Error(`Cannot read preview status: ${statusResponse.status}`);
          const status = await statusResponse.json();
          if (status.state !== "deployed" || status.revision !== pullRequest.head.sha) {
            throw new Error(`Preview is not deployed for the accepted revision: ${JSON.stringify(status)}`);
          }
          const acceptanceResponse = await fetch(
            `${api}/statuses/${pullRequest.head.sha}`,
            {
              method: "POST",
              headers,
              body: JSON.stringify({
                context: "runtime-acceptance",
                description: `Accepted ${status.slot} at the exact Preview revision`,
                state: "success",
                target_url: pullRequest.html_url,
              }),
            },
          );
          if (!acceptanceResponse.ok) {
            throw new Error(`Cannot record runtime acceptance: ${acceptanceResponse.status}`);
          }
          const response = await fetch("https://api.github.com/graphql", {
            method: "POST",
            headers,
            body: JSON.stringify({
              query: `mutation($id: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $id, mergeMethod: SQUASH}) {
                  pullRequest { number }
                }
              }`,
              variables: { id: pullRequest.node_id },
            }),
          });
          const result = await response.json();
          if (!response.ok || result.errors) throw new Error(JSON.stringify(result));
          console.log(`Accepted ${status.slot} at exact revision ${status.revision}.`);
          NODE
