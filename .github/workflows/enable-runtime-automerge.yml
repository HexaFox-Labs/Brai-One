name: enable-runtime-automerge

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  accept-exact-preview:
    name: accept-exact-preview
    if: >-
      github.event.review.state == 'approved' &&
      github.event.review.user.login == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'dev' &&
      vars.BRAI_DELIVERY_ENDPOINT != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enable native auto-merge only for the exact deployed preview revision
        env:
          BRAI_DELIVERY_ENDPOINT: ${{ vars.BRAI_DELIVERY_ENDPOINT }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          node --input-type=module <<'NODE'
          const oidcResponse = await fetch(
            `${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=brai-delivery`,
            { headers: { authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` } },
          );
          if (!oidcResponse.ok) throw new Error(`Cannot get GitHub OIDC token: ${oidcResponse.status}`);
          const { value: oidc } = await oidcResponse.json();
          const statusResponse = await fetch(
            `${process.env.BRAI_DELIVERY_ENDPOINT}/v1/status?branch=${encodeURIComponent(process.env.PR_BRANCH)}`,
            { headers: { authorization: `Bearer ${oidc}` } },
          );
          if (!statusResponse.ok) throw new Error(`Cannot read preview status: ${statusResponse.status}`);
          const status = await statusResponse.json();
          if (status.state !== "deployed" || status.revision !== process.env.HEAD_SHA) {
            console.log(`Preview is not deployed for this review revision: ${JSON.stringify(status)}`);
            process.exit(0);
          }
          const response = await fetch("https://api.github.com/graphql", {
            method: "POST",
            headers: {
              accept: "application/vnd.github+json",
              authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              "content-type": "application/json",
              "x-github-api-version": "2022-11-28",
            },
            body: JSON.stringify({
              query: `mutation($id: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $id, mergeMethod: SQUASH}) {
                  pullRequest { number }
                }
              }`,
              variables: { id: process.env.PR_NODE_ID },
            }),
          });
          const result = await response.json();
          if (!response.ok || result.errors) throw new Error(JSON.stringify(result));
          console.log(`Accepted ${status.slot} at exact revision ${status.revision}.`);
          NODE
