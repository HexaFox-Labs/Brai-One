name: brai-new

x-runtime-security: &runtime-security
  restart: unless-stopped
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "3"

services:
  brai-web:
    <<: *runtime-security
    image: brai-web:0.0.1
    container_name: brai-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "127.0.0.1:3200:8080"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - brai-edge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - http://127.0.0.1:8080/health/live | grep -q ''"status":"ok"''',
        ]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    stop_grace_period: 10s

  brai-api-gateway:
    <<: *runtime-security
    image: brai-api-gateway:0.0.1
    container_name: brai-api-gateway
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    env_file:
      - path: ${BRAI_CONFIG_DIR:-/etc/brai-new}/gateway.env
        required: false
    ports:
      - "127.0.0.1:3201:3201"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks:
      - brai-edge
      - brai-bus
    depends_on:
      brai-nats:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3201/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    stop_grace_period: 20s

  brai-nats:
    <<: *runtime-security
    image: brai-nats:0.0.1
    container_name: brai-nats
    build:
      context: .
      dockerfile: infrastructure/nats/Dockerfile
    command:
      - --config
      - /etc/nats/nats-server.conf
    env_file:
      - path: ${BRAI_CONFIG_DIR:-/etc/brai-new}/nats.env
        required: false
    ports:
      - target: 4222
        published: "4222"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - type: bind
        source: ./infrastructure/nats/nats-server.conf
        target: /etc/nats/nats-server.conf
        read_only: true
      - type: volume
        source: brai-nats-data
        target: /data
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    networks:
      - brai-bus
      # Docker does not materialize host port bindings for an endpoint that is
      # attached only to an `internal` bridge. This dedicated bridge has no
      # other application members; the only published socket remains
      # 127.0.0.1:4222 for the root-owned runtime-host service.
      - brai-host-loopback
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - ''http://127.0.0.1:8222/healthz?js-enabled-only=true'' | grep -q ''"status":"ok"''',
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    stop_grace_period: 20s

  brai-factory:
    <<: *runtime-security
    image: brai-factory:0.0.1
    container_name: brai-factory
    build:
      context: .
      dockerfile: services/brai-factory/Dockerfile
    env_file:
      - path: ${BRAI_CONFIG_DIR:-/etc/brai-new}/factory.env
        required: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks:
      - brai-bus
      - brai-supabase
    depends_on:
      brai-nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 8s
      start_period: 15s
      retries: 3
    stop_grace_period: 20s

  brai-access:
    <<: *runtime-security
    image: brai-access:0.0.1
    container_name: brai-access
    build:
      context: .
      dockerfile: services/brai-access/Dockerfile
    env_file:
      - path: ${BRAI_CONFIG_DIR:-/etc/brai-new}/access.env
        required: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks:
      - brai-bus
      - brai-supabase
    depends_on:
      brai-nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 8s
      start_period: 15s
      retries: 3
    stop_grace_period: 20s

  brai-factory-admin:
    profiles:
      - admin
    image: brai-factory-admin:0.0.1
    container_name: brai-factory-admin
    build:
      context: .
      dockerfile: infrastructure/supabase/Dockerfile
    env_file:
      - path: ${BRAI_CONFIG_DIR:-/etc/brai-new}/migrations.env
        required: false
    read_only: true
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    networks:
      - brai-supabase
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"

networks:
  brai-edge:
    name: brai-edge
    driver: bridge
  brai-bus:
    name: brai-bus
    driver: bridge
    internal: true
  brai-host-loopback:
    name: brai-host-loopback
    driver: bridge
  brai-supabase:
    name: brai-supabase
    external: true

volumes:
  brai-nats-data:
    name: brai-nats-data
